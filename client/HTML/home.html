<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/CSS/landing_page.css">
  <title>Home</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .home-container {
      background: white;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      text-align: center;
      max-width: 500px;
      width: 90%;
    }
    .home-container h1 {
      color: #333;
      margin-bottom: 20px;
    }
    .user-info {
      background: #f5f5f5;
      padding: 20px;
      border-radius: 8px;
      margin: 20px 0;
      text-align: left;
    }
    .user-info p {
      margin: 10px 0;
      color: #555;
    }
    .logout-btn {
      background: #667eea;
      color: white;
      padding: 12px 30px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 20px;
    }
    .logout-btn:hover {
      background: #764ba2;
    }
    .error {
      color: #e74c3c;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="home-container">
    <h1>Welcome!</h1>
    <div id="userInfo" class="user-info">
      <p>Loading user information...</p>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <script src="/JS/home.js"></script>
</body>
</html>
